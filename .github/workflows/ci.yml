name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10
      - name: Check actions are pinned to SHAs and meet minimum age
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MIN_AGE_DAYS: 7
        run: |
          failed=0
          now=$(date -u +%s)

          unpinned=$(grep -rh 'uses:' .github/workflows/ \
            | sed 's/.*uses:[[:space:]]*//' \
            | sed 's/[[:space:]].*//' \
            | grep '@' \
            | grep -v '\$' \
            | grep -v '@[0-9a-f]\{40\}' || true)
          if [ -n "$unpinned" ]; then
            echo "## Action Pin Check Failed" >> "$GITHUB_STEP_SUMMARY"
            echo "The following actions are not pinned to a SHA:" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
            echo "$unpinned" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
            echo "All actions must be pinned to a full commit SHA." >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Actions not pinned to a SHA: $unpinned"
            failed=1
          fi

          while IFS= read -r ref; do
            repo=$(echo "$ref" | cut -d@ -f1 | cut -d/ -f1-2)
            sha=$(echo "$ref" | cut -d@ -f2)
            date_str=$(gh api repos/$repo/commits/$sha --jq '.commit.committer.date' 2>/dev/null || echo "")
            [ -z "$date_str" ] && continue
            commit_time=$(date -u -d "$date_str" +%s)
            age_days=$(( (now - commit_time) / 86400 ))
            if [ "$age_days" -lt "$MIN_AGE_DAYS" ]; then
              major=$(echo "$ref" | grep -oE '@v[0-9]+' | tr -d '@')
              suggestion=$(gh api repos/$repo/git/refs/tags --jq '.[].ref' \
                | grep -E "refs/tags/${major}\.[0-9]+\.[0-9]+$" \
                | sort -V \
                | while read -r t; do
                    t=${t#refs/tags/}
                    r=$(gh api repos/$repo/git/refs/tags/$t --jq '{type: .object.type, sha: .object.sha}')
                    s=$(echo "$r" | jq -r '.sha')
                    [ "$(echo "$r" | jq -r '.type')" = "tag" ] && s=$(gh api repos/$repo/git/tags/$s --jq '.object.sha')
                    d=$(gh api repos/$repo/commits/$s --jq '.commit.committer.date' 2>/dev/null || echo "")
                    [ -z "$d" ] && continue
                    ct=$(date -u -d "$d" +%s)
                    ad=$(( (now - ct) / 86400 ))
                    [ "$ad" -ge "$MIN_AGE_DAYS" ] && echo "$t $s" && break
                  done | tail -1)
              {
                echo "## Action Age Check Failed"
                echo "**\`$ref\`** is only $age_days day(s) old (minimum: $MIN_AGE_DAYS days)."
                if [ -n "$suggestion" ]; then
                  stag=$(echo "$suggestion" | cut -d' ' -f1)
                  ssha=$(echo "$suggestion" | cut -d' ' -f2)
                  echo ""
                  echo "Suggested alternative (oldest qualifying version in same major):"
                  echo "\`\`\`"
                  echo "uses: $repo@$ssha # $stag"
                  echo "\`\`\`"
                fi
              } >> "$GITHUB_STEP_SUMMARY"
              echo "::error::$ref is only $age_days day(s) old (minimum: $MIN_AGE_DAYS days)"
              failed=1
            fi
          done < <(grep -rh 'uses:' .github/workflows/ \
            | sed 's/.*uses:[[:space:]]*//' \
            | sed 's/[[:space:]].*//' \
            | grep -v '\$' \
            | grep '@[0-9a-f]\{40\}' \
            | sort -u || true)

          [ "$failed" -eq 0 ] && echo "All actions are SHA-pinned and meet the $MIN_AGE_DAYS-day minimum age." >> "$GITHUB_STEP_SUMMARY"
          exit $failed
      - run: pnpm audit --audit-level=critical
      - run: pnpm audit --audit-level=high --ignore-unfixable
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate:
    name: Lint, Typecheck & Unit Tests
    runs-on: ubuntu-latest
    needs: security-audit
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm format:check
      - run: pnpm build-storybook
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: github.ref == 'refs/heads/main'
        with:
          name: storybook-static
          path: storybook-static/
          retention-days: 1
      - run: pnpm test:coverage
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e --project=chromium
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  storybook:
    name: Deploy Storybook
    runs-on: ubuntu-latest
    needs: e2e
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: storybook-static
          path: storybook-static/
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: storybook-static/
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
